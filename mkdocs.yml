site_name: ZenSynora Documentation
site_url: https://adrianx26.github.io/zensynora
repo_url: https://github.com/adrianx26/zensynora
nav:
  - Home: index.md
  - API: api.md
  - Architecture: architecture_with_optimizations.md
  - Usage: usage.md
theme:
  name: material
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          setup_commands:
            - import sys; sys.path.append('.')
markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
